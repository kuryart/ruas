name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust: unit tests + clippy ─────────────────────────────────────────────
  rust:
    name: Rust tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      # ruas_api compiles cleanly but has no tests yet — cargo check is enough.
      - name: Check ruas_api compiles
        run: cargo check -p ruas_api

      # ruas_core has unit + integration tests.
      - name: Test ruas_core
        run: cargo test -p ruas_core

      # Lint levels are declared in workspace Cargo.toml:
      # correctness + suspicious = deny (actual bugs); style + perf = warn.
      - name: Clippy ruas_core
        run: cargo clippy -p ruas_core

      - name: Clippy ruas_api
        run: cargo clippy -p ruas_api

  # ── JavaScript: ruas-cmtables + frontend (same runner, shared fs) ─────────
  js:
    name: JS lint, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: packages/ruas-cmtables/pnpm-lock.yaml

      # ── ruas-cmtables ──
      - name: Install ruas-cmtables deps
        working-directory: packages/ruas-cmtables
        run: pnpm install --frozen-lockfile

      - name: Lint ruas-cmtables
        working-directory: packages/ruas-cmtables
        run: pnpm lint:ci

      - name: Build ruas-cmtables (produces dist/)
        working-directory: packages/ruas-cmtables
        run: pnpm build

      - name: Test ruas-cmtables
        working-directory: packages/ruas-cmtables
        run: pnpm test

      # ── Frontend (depends on ruas-cmtables dist/) ──
      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Test frontend (Vitest)
        working-directory: frontend
        run: pnpm test

  # ── Plugins: verify .wasm matches source ─────────────────────────────────
  plugins:
    name: Verify plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Build all plugins and check diff
        run: |
          for d in plugins/*/; do
            if [ ! -f "${d}Cargo.toml" ]; then continue; fi
            name=$(basename "$d")
            echo "Checking $name..."
            (cd "$d" && cargo build --target wasm32-unknown-unknown --release)
            wasm_name=$(echo "$name" | tr '-' '_')
            src="$d/target/wasm32-unknown-unknown/release/${wasm_name}.wasm"
            dest="${d}plugin.wasm"
            if [ ! -f "$src" ]; then
              echo "ERROR: .wasm not found at $src"
              exit 1
            fi
            if ! cmp -s "$src" "$dest"; then
              echo ""
              echo "ERROR: plugin.wasm for '$name' is out of date."
              echo "Run: ./scripts/build-plugins.sh"
              echo "Then commit the updated plugin.wasm."
              echo ""
              exit 1
            fi
            echo "  ✓ $name is up to date"
          done

  # ── E2E: Playwright against Astro dev server (no Tauri required) ──────────
  # Tests mock all API calls via page.route() — no Rust binary needed.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [rust, js]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # ruas-cmtables must be built first — frontend links to its dist/ via pnpm link:.
      - name: Install & build ruas-cmtables
        working-directory: packages/ruas-cmtables
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e
