name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust: unit + integration tests ──────────────────────────────────────────
  rust:
    name: Rust tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      # ruas_api compiles cleanly but has no tests yet — cargo check is enough.
      - name: Check ruas_api compiles
        run: cargo check -p ruas_api

      # ruas_core has unit + integration tests (92 tests as of this writing).
      - name: Test ruas_core
        run: cargo test -p ruas_core

      # Lint levels are declared in workspace Cargo.toml:
      # correctness + suspicious = deny (actual bugs); style + perf = warn.
      - name: Clippy ruas_core
        run: cargo clippy -p ruas_core

      - name: Clippy ruas_api
        run: cargo clippy -p ruas_api

  # ── Frontend: Vitest unit tests ──────────────────────────────────────────────
  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest
        run: pnpm test

  # ── E2E: Playwright against Astro dev server (no Tauri required) ─────────────
  # Tests mock all API calls via page.route() — no Rust binary needed.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [rust, frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e
