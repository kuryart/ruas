name: Publish (ruas-cmtables)

on:
  release:
    types: [created]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: packages/ruas-cmtables/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: packages/ruas-cmtables
        run: pnpm install --frozen-lockfile

      - name: Build dist
        working-directory: packages/ruas-cmtables
        run: pnpm build

      - name: Publish to npm
        working-directory: packages/ruas-cmtables
        run: pnpm publish
